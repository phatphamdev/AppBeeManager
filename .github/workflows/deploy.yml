name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # Tự động deploy khi push lên main
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

# Cấp quyền ghi vào GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép 1 deployment chạy cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Inject Supabase credentials từ GitHub Secrets
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOONG_API_KEY: ${{ secrets.VITE_GOONG_API_KEY }}
          # VietQR (tùy chọn)
          VITE_VIETQR_BANK_ID: ${{ secrets.VITE_VIETQR_BANK_ID }}
          VITE_VIETQR_ACCOUNT: ${{ secrets.VITE_VIETQR_ACCOUNT }}
          VITE_VIETQR_NAME: ${{ secrets.VITE_VIETQR_NAME }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"  # Thư mục output của Vite

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
